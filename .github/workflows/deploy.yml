name: Build and Push GuruBhet

on:
  push:
    branches: ["feature/fyp-payment"]
    paths:
      - "backend/**"
      - "Frontend/**"
      - ".github/workflows/deploy.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      student: ${{ steps.filter.outputs.student }}
      teacher: ${{ steps.filter.outputs.teacher }}
      staff: ${{ steps.filter.outputs.staff }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend: 'backend/**'
            student: 'Frontend/Student/**'
            teacher: 'Frontend/Teacher/**'
            staff: 'Frontend/Staff/**'
            workflow: '.github/workflows/deploy.yml'

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/gurubhet-api:latest

  build-student:
    needs: changes
    if: ${{ needs.changes.outputs.student == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and Push Student App
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/Student
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/gurubhet-student:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  build-teacher:
    needs: changes
    if: ${{ needs.changes.outputs.teacher == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and Push Teacher App
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/Teacher
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/gurubhet-teacher:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  build-staff:
    needs: changes
    if: ${{ needs.changes.outputs.staff == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and Push Staff App
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/Staff
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/gurubhet-staff:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
