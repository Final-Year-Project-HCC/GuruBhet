name: Build and Push GuruBhet

on:
  push:
    branches: ["main"] # Trigger whenever you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gurubhet-api:latest

      - name: Build and Push Student App
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/student
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gurubhet-student:latest
